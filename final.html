function openFinds(x){return x.findings.filter(y=>['OPEN','REVIEWED'].includes(y.issue_status))}
function calc(x){return Math.max(0,100-openFinds(x).reduce((s,y)=>s+w(y.severity),0))}

function toast(t){S.toast=t;setTimeout(()=>{S.toast='';render()},3000)} function go(v){S.view=v;render()} function selectBom(id){S.bom=id;let x=b();S.finding=x.findings[0]?.finding_id||S.finding;S.run=x.runs[0]?.run_id||S.run;S.view='BOM Detail';render()} function selectFinding(id){let x=DB.boms.find(z=>z.findings.some(y=>y.finding_id===id)); if(x){S.bom=x.bom_id;S.finding=id;S.run=x.runs[0]?.run_id||S.run} S.view='Finding Review';render()} function selectRun(id){let x=DB.boms.find(z=>z.runs.some(y=>y.run_id===id)); if(x){S.bom=x.bom_id;S.run=id} S.view='Run History';render()}
function changeStatus(){let x=f(), ns=$('#newStatus').value, c=$('#comment').value.trim(); if(!ROLES[S.role].review)return toast('This role cannot change finding status.'); if(ns==='IGNORED'&&!c)return toast('Ignored requires a non-empty comment.'); let old=x.issue_status; x.issue_status=ns; x.review_comment=c||x.review_comment; let userName=S.role==='Administrator'?'Rohit Mehta':'Sarah Khan'; x.reviewed_by=userName+' ('+S.role+')'; x.reviewed_at=new Date().toISOString(); x.status_history_json.push({oldStatus:old,newStatus:ns,user:x.reviewed_by,comment:c,timestamp:x.reviewed_at}); b().health_score=calc(b()); b().status_label=b().health_score===100?'Healthy':'Risky'; toast(`Finding #${x.finding_id} changed to ${ns}`); render()}

function dashboard(){
    let af=allF();
    
    // Dynamic Class Health Calculation[cite: 1]
    let classStats = {};
    DB.boms.forEach(b => {
        let isRisky = b.health_score < 100;
        let classesInBom = new Set(b.components.map(c => c.component_item_class).filter(Boolean));
        classesInBom.forEach(cls => {
            if(!classStats[cls]) classStats[cls] = { total: 0, risky: 0 };
            classStats[cls].total++;
            if(isRisky) classStats[cls].risky++;
        });
    });
    let classArr = Object.keys(classStats).map(k => {
        let s = classStats[k];
        let healthPct = Math.round(((s.total - s.risky) / s.total) * 100);
        let barColor = healthPct >= 90 ? 'bg-emerald-500' : (healthPct >= 70 ? 'bg-amber-400' : 'bg-rose-500');
        let textColor = healthPct >= 90 ? 'text-emerald-600' : (healthPct >= 70 ? 'text-amber-500' : 'text-rose-600');
        let riskLabel = healthPct >= 90 ? 'Healthy' : (healthPct >= 70 ? 'Warning' : 'Critical Risk');
        return { name: k, total: s.total, risky: s.risky, healthPct: healthPct, barColor, textColor, riskLabel };
    }).sort((a,b) => b.risky - a.risky || a.name.localeCompare(b.name));

    let visibleClasses = S.showAllClasses ? classArr : classArr.slice(0, 3);
    
    let boms = DB.boms.slice();
    if(S.bomSearch) boms = boms.filter(x => x.item_number.toLowerCase().includes(S.bomSearch) || x.description.toLowerCase().includes(S.bomSearch));
    if(S.bomFilter && S.bomFilter !== 'All') boms = boms.filter(x => x.status_label === S.bomFilter);
    if(S.bomSeverityFilter && S.bomSeverityFilter !== 'All') boms = boms.filter(x => x.findings.some(f => f.severity === S.bomSeverityFilter));
    if(S.bomClassFilter && S.bomClassFilter !== 'All') boms = boms.filter(x => x.components.some(c => c.component_item_class === S.bomClassFilter));
    boms.sort((a,b)=>a.health_score-b.health_score);

    let filtersActive = S.bomSeverityFilter !== 'All' || S.bomClassFilter !== 'All';
    let filterTags = '';
    if(S.bomSeverityFilter !== 'All') filterTags += `<span class="inline-flex items-center gap-1.5 bg-white text-slate-700 px-3 py-1 rounded border border-slate-200 shadow-sm text-xs font-bold">Severity: ${S.bomSeverityFilter} <button onclick="S.bomSeverityFilter='All';render()" class="hover:text-rose-600 ml-1">✕</button></span>`;
    if(S.bomClassFilter !== 'All') filterTags += `<span class="inline-flex items-center gap-1.5 bg-white text-slate-700 px-3 py-1 rounded border border-slate-200 shadow-sm text-xs font-bold">Class: ${S.bomClassFilter} <button onclick="S.bomClassFilter='All';render()" class="hover:text-rose-600 ml-1">✕</button></span>`;
    if (filtersActive) filterTags += `<button onclick="S.bomSeverityFilter='All'; S.bomClassFilter='All'; render()" class="text-[10px] font-bold text-slate-500 hover:text-slate-800 transition-colors uppercase tracking-wider ml-1 underline underline-offset-2">Clear All</button>`;

    return shell(`<section class="space-y-6">
        <div class="flex justify-between gap-3 flex-wrap items-end mb-2">
            <div><h2 class="text-3xl font-black text-slate-900 tracking-tight">Landing Dashboard</h2>
            <p class="text-slate-600 mt-1 text-base font-medium">Core leadership metrics, risky BOMs, and open issues.</p></div>
        </div>
        
        <!-- Clean 2-Row Executive Grid: Row 1 (Top Banner) -->
        <div class="grid lg:grid-cols-3 gap-6 mb-6 items-stretch">
            <!-- Issue Count by Severity -->
            <div class="card p-6 border-slate-200 shadow-sm flex flex-col h-full bg-white">
                <div class="flex justify-between items-center mb-4 border-b border-slate-100 pb-3">
                    <h3 class="font-black text-lg text-slate-900">Issue Count by Severity</h3>
                    <p class="text-xs text-slate-500 italic bg-slate-50 px-2 py-1 rounded border border-slate-100 hidden sm:block">Click row to filter table</p>
                </div>
                <div class="space-y-1 flex-1 flex flex-col justify-center">
                ${['CRITICAL','HIGH','WARNING','INFO'].map(s=>`
                    <div onclick="S.bomSeverityFilter='${s}';render()" class="flex justify-between items-center py-2.5 px-3 cursor-pointer hover:bg-slate-50 rounded-lg transition-all border border-transparent hover:border-slate-200 hover:shadow-sm ${S.bomSeverityFilter===s?'bg-slate-50 border-slate-300 shadow-inner ring-1 ring-slate-200':''}">
                        <span class="pill shadow-sm text-xs px-3 py-1 ${sv(s)}">${s}</span>
                        <b class="text-xl text-slate-800">${af.filter(x=>x.severity===s).length}</b>
                    </div>
                `).join('')}
                </div>
            </div>
            
            <!-- BOM Health by Item Class -->
            <div class="card p-6 border-slate-200 shadow-sm flex flex-col h-full bg-white">
                <div class="flex justify-between items-center mb-4 border-b border-slate-100 pb-3">
                    <h3 class="font-black text-lg text-slate-900">BOM Health by Item Class</h3>
                    <button onclick="S.showAllClasses = !S.showAllClasses; render()" class="text-xs font-bold text-slate-500 hover:text-slate-800 transition-colors bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-200 shadow-sm">${S.showAllClasses ? 'Show Top 3' : 'View All Classes'}</button>
                </div>
                <div class="flex-1 flex flex-col justify-start space-y-4 overflow-y-auto max-h-[350px] pr-2">
                    ${visibleClasses.map(cls => `
                        <div onclick="S.bomClassFilter='${cls.name}'; render()" class="bg-slate-50 p-4 rounded-xl border transition-all cursor-pointer hover:shadow-md hover:border-slate-300 hover:-translate-y-0.5 ${S.bomClassFilter === cls.name ? 'border-slate-400 ring-2 ring-slate-200 bg-white shadow-sm' : 'border-slate-100'}">
                            <div class="flex justify-between text-sm mb-2">
                                <span class="font-bold text-slate-900">${cls.name}</span>
                                <span class="font-black ${cls.textColor}">${cls.healthPct}% ${cls.riskLabel}</span>
                            </div>
                            <div class="w-full bg-slate-200 rounded-full h-2.5 mb-2 overflow-hidden shadow-inner">
                                <div class="${cls.barColor} h-2.5 rounded-full transition-all" style="width: ${cls.healthPct}%"></div>
                            </div>
                            <div class="text-xs text-slate-600 font-bold">${cls.risky} Risky / ${cls.total} Total BOMs</div>
                        </div>
                    `).join('')}
                    ${classArr.length === 0 ? '<div class="text-sm font-medium text-slate-500 text-center py-4">No item classes found in BOMs.</div>' : ''}
                </div>
            </div>

            <!-- Open Issues to Review -->
            <div onclick="S.fs='OPEN'; go('Finding Review')" class="card p-6 bg-slate-900 text-white flex flex-col justify-center items-center text-center shadow-lg border-slate-800 relative overflow-hidden cursor-pointer hover:bg-slate-800 transition-all group h-full">
                <div class="absolute -right-8 -top-8 w-32 h-32 bg-slate-800 rounded-full opacity-50 group-hover:scale-110 transition-transform duration-500"></div>
                <div class="absolute -left-8 -bottom-8 w-24 h-24 bg-slate-800 rounded-full opacity-30 group-hover:scale-125 transition-transform duration-700"></div>
                
                <h3 class="font-black text-xl mb-2 text-slate-100 relative z-10 flex items-center gap-2">
                    Open Issues to Review 
                    <svg class="w-5 h-5 text-amber-400 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </h3>
                <div class="text-7xl font-black text-amber-400 relative z-10 leading-none drop-shadow-lg">${af.filter(x=>['OPEN','REVIEWED'].includes(x.issue_status)).length}</div>
            </div>
        </div>

        <!-- Clean 2-Row Executive Grid: Row 2 (Bottom Workspace - Full Width) -->
        <div class="card overflow-hidden shadow-sm border-slate-200 bg-white flex flex-col w-full">
            <div class="p-6 border-b bg-slate-50/80 flex flex-wrap justify-between items-center gap-4">
                <div>
                    <div class="flex flex-wrap items-center gap-4 mb-2">
                        <h3 class="font-black text-xl text-slate-900">Top Risky BOMs & Total Health</h3>

                    <select onchange="S.bomFilter=this.value;render()" class="px-4 py-2 border border-slate-300 rounded-xl bg-white text-sm font-bold text-slate-700 focus:ring-2 focus:ring-slate-900 focus:outline-none transition-all cursor-pointer shadow-sm">
                        <option value="All" ${S.bomFilter==='All'?'selected':''}>All Statuses</option>
                        <option value="Risky" ${S.bomFilter==='Risky'?'selected':''}>Risky</option>
                        <option value="Healthy" ${S.bomFilter==='Healthy'?'selected':''}>Healthy</option>
                    </select>
                </div>
            </div>
            <div class="overflow-x-auto flex-1">
                <table class="min-w-full text-base text-left">
                    <thead class="bg-white border-b border-slate-200">

                    <tbody class="divide-y divide-slate-100">
                        ${boms.map(x=>`<tr onclick="selectBom(${x.bom_id})" class="row cursor-pointer transition-colors hover:bg-slate-50">

function hist(x) {

                `).join('')}

        </div>
        <div class="card p-6 shadow-sm border-slate-200 bg-white">
            <h3 class="font-black text-2xl text-slate-900 mb-5">Complete Finding Status Audit Trail</h3>
            <div class="space-y-4 border-l-2 border-slate-200 pl-5 ml-3">
                ${events.map(e=>`
                    <div class="relative bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
                        <div class="absolute -left-[30px] top-6 w-3 h-3 rounded-full bg-slate-300 border-[3px] border-white shadow-sm"></div>
                        <div class="flex justify-between items-center mb-3 border-b border-slate-100 pb-3">
                            <b class="text-slate-900 font-black text-base">Finding #${e.finding_id} • ${e.rule_name}</b>
                            <span class="text-xs font-bold text-slate-500 bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-200 shadow-sm flex items-center gap-1.5"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg> ${dt(e.timestamp)}</span>
                        </div>
                        <div class="text-sm text-slate-700 mt-2 mb-3 bg-slate-50 p-3 rounded-lg border border-slate-100 font-medium">Status transition: <span class="font-bold text-slate-400 mx-1">${e.oldStatus}</span> <span class="text-slate-300">➔</span> <span class="font-black text-slate-900 ml-1 px-2 py-0.5 bg-white rounded shadow-sm border border-slate-200">${e.newStatus}</span></div>
                        <div class="text-sm font-bold text-slate-500 flex items-center gap-1.5"><svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg> Authorized by: <span class="text-slate-800">${e.user}</span></div>
                        ${e.comment ? `<div class="text-sm mt-4 p-4 bg-amber-50 border border-amber-100 rounded-lg italic text-amber-900 shadow-inner font-medium border-l-4 border-l-amber-400">"${e.comment}"</div>` : ''}
                    </div>
                `).join('') || '<div class="text-slate-500 font-bold p-6 text-center text-lg bg-slate-50 border border-slate-200 rounded-xl">No finding status changes recorded in audit history.</div>'}
            </div>
        </div>
    </div>`;
}

function runHist() {
    let rows = allR();
    let displayCols = ['run_kind', 'trigger_type', 'status', 'requested_by', 'started_at'];
    let displayHeaders = ['Run Type', 'Trigger Type', 'Status', 'Requested By', 'Started At'];

    return shell(`
        <section class="space-y-6">
            <div class="flex justify-between flex-wrap">
                <div>
                    <h2 class="text-3xl font-black text-slate-900">Run History</h2>
                    <p class="text-slate-600 mt-1 text-base font-medium">Clean view of import and validation executions across all BOMs.</p>
                </div>
            </div>
            <div class="card overflow-hidden bg-white rounded-2xl shadow-sm border-slate-200">
                <div class="p-4 border-b bg-slate-50/80 flex justify-between items-center">
                    <h3 class="font-black text-lg text-slate-900">Execution Log</h3>
                    <div class="text-xs font-bold text-slate-500 flex items-center gap-1.5 bg-white px-2.5 py-1 rounded-md border border-slate-200 shadow-sm">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Click row to reveal raw Technical Metadata payload
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full text-sm text-left border-collapse">
                        <thead class="bg-white border-b border-slate-200">
                            <tr>
                                <th class="p-4 font-bold text-slate-500 uppercase tracking-wider text-xs whitespace-nowrap">BOM Assembly</th>
                                ${displayHeaders.map(h => `<th class="p-4 font-bold text-slate-500 uppercase tracking-wider text-xs whitespace-nowrap">${h}</th>`).join('')}
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                            ${rows.map(q => `
                                <tr onclick="S.expandedRuns=S.expandedRuns||{}; S.expandedRuns[${q.run_id}]=!S.expandedRuns[${q.run_id}]; render()" class="cursor-pointer hover:bg-slate-50 transition-colors group">
                                    <td class="p-4 font-black text-slate-900 text-base whitespace-nowrap group-hover:text-blue-700 transition-colors">${q.item_number}</td>
                                    ${displayCols.map(k => {
                                        let val = q[k];
                                        if(k === 'status') return `<td class="p-4"><span class="pill shadow-sm text-xs px-2.5 py-1 ${st(val)}">${val}</span></td>`;
                                        if(k.includes('_at')) val = dt(val);
                                        return `<td class="p-4 font-bold text-slate-700 whitespace-nowrap">${fmt(val)}</td>`;
                                    }).join('')}
                                </tr>
                                ${(S.expandedRuns||{})[q.run_id] ? `
                                <tr class="bg-slate-50 border-b-2 border-slate-200 shadow-inner">
                                    <td colspan="6" class="p-5">
                                        <div class="bg-white rounded-lg border border-slate-200 p-4 shadow-sm">
                                            <h4 class="font-black text-xs uppercase text-slate-500 mb-3 tracking-widest border-b border-slate-100 pb-2">Technical Execution Metadata</h4>
                                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-xs font-mono text-slate-600">
                                                <div><b class="text-slate-900 font-sans block mb-0.5">Run ID:</b> ${q.run_id}</div>
                                                <div><b class="text-slate-900 font-sans block mb-0.5">Internal BOM ID:</b> ${q.bom_id}</div>
                                                <div><b class="text-slate-900 font-sans block mb-0.5">Source Mode:</b> ${fmt(q.source_mode)}</div>
                                                <div><b class="text-slate-900 font-sans block mb-0.5">Input Count:</b> ${q.input_count}</div>
                                                <div class="col-span-2 md:col-span-4 mt-1"><b class="text-slate-900 font-sans block mb-0.5">Idempotency Key:</b> <span class="bg-slate-50 px-2 py-1 border rounded block mt-0.5 break-all">${fmt(q.idempotency_key)}</span></div>
                                                <div class="col-span-2 md:col-span-4"><b class="text-slate-900 font-sans block mb-0.5">Correlation Trace ID:</b> <span class="bg-slate-50 px-2 py-1 border rounded block mt-0.5 break-all">${q.correlation_id}</span></div>
                                            </div>
                                        </div>
                                    </td>
                                </tr>` : ''}
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    `);
}

function logs() {
    if (!ROLES[S.role].logs) return shell(`<div class="card p-10 border-slate-200 shadow-sm text-center bg-white"><h2 class="text-3xl font-black text-slate-900 mb-3">Integration Logs Restricted</h2><p class="text-slate-600 text-lg font-medium">Administrator active role capability is required to view raw redacted import, validation, and AI diagnostic payloads.</p></div>`);
    return shell(`
        <section class="space-y-6">
            <div>
                <h2 class="text-3xl font-black text-slate-900 mb-1">Integration Logs</h2>
                <p class="text-slate-600 text-base font-medium">Redacted backend operational diagnostics traceable by exact correlation ID.</p>
            </div>
            <div class="card overflow-auto bg-white rounded-2xl shadow-sm border-slate-200">
                <table class="min-w-full text-sm text-left border-collapse">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="p-4 font-bold text-slate-500 uppercase tracking-wider text-xs whitespace-nowrap">Correlation ID Trace</th>
                            <th class="p-4 font-bold text-slate-500 uppercase tracking-wider text-xs">Processing Stage</th>
                            <th class="p-4 font-bold text-slate-500 uppercase tracking-wider text-xs">Source Mode</th>
                            <th class="p-4 font-bold text-slate-500 uppercase tracking-wider text-xs">Terminal Status</th>
                            <th class="p-4 font-bold text-slate-500 uppercase tracking-wider text-xs">Timestamp</th>
                            <th class="p-4 font-bold text-slate-500 uppercase tracking-wider text-xs w-full">Diagnostic Details</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        ${DB.logs.map(q => `<tr class="border-b border-slate-100">
                            <td class="p-4 font-mono text-xs text-slate-500 bg-slate-50 border-r border-slate-100">${q.correlation_id}</td>
                            <td class="p-4 font-black text-slate-900 text-base whitespace-nowrap">${q.stage}</td>
                            <td class="p-4 text-slate-700 font-bold">${q.source_mode}</td>
                            <td class="p-4"><span class="pill shadow-sm px-2.5 py-1 text-xs ${st(q.status)}">${q.status}</span></td>
                            <td class="p-4 text-slate-700 font-bold whitespace-nowrap">${dt(q.time)}</td>
                            <td class="p-4 text-slate-700 leading-relaxed font-medium">${q.details}</td>
                        </tr>`).join('')}
                    </tbody>
                </table>
            </div>
        </section>
    `);
}

function rules(){
    let adminBtns = S.role === 'Administrator' ? `
        ${ROLES[S.role].run ? `<button class="px-5 py-2.5 rounded-xl bg-emerald-600 text-white font-black text-sm transition-all hover:bg-emerald-700 shadow-sm" onclick="S.modal='schedule';render()">Run Scheduled Validation</button>` : ''}
        <button onclick="S.modal='addRule';render()" class="px-5 py-2.5 rounded-xl bg-slate-900 text-white font-black text-sm transition-all hover:bg-slate-800 shadow-sm">+ Add New Logic Rule</button>
    ` : `<div class="bg-amber-50 border border-amber-200 text-amber-800 px-3 py-1.5 rounded-lg font-bold text-xs shadow-sm">View-only mode: Administration functions restricted.</div>`;

    return shell(`<section><div class="flex justify-between items-center mb-6 flex-wrap gap-4">
        <div><h2 class="text-3xl font-black mb-1 text-slate-900">Readable Rule Engine Metadata</h2>
        <p class="text-slate-600 font-medium text-base">Transparent dictionary of active deterministic thresholds and validation logic mappings.</p></div>
        <div class="flex gap-3 items-center">
            ${adminBtns}
        </div>
    </div>
    <div class="grid md:grid-cols-2 xl:grid-cols-3 gap-6">
        ${RULES.map(r=>`<div class="card p-6 shadow-sm border-slate-200 bg-white flex flex-col h-full"><div class="flex justify-between gap-3 items-start mb-3"><div><b class="text-xl text-slate-900 font-black">${r.name}</b><div class="text-xs font-black text-slate-500 mt-1.5 tracking-widest bg-slate-100 inline-block px-2 py-1 rounded border border-slate-200 shadow-sm">${r.code}</div></div><span class="pill shadow-sm px-2.5 py-1 text-xs ${sv(r.severity)} border border-transparent">${r.severity}</span></div><p class="text-base text-slate-700 mt-2 mb-5 leading-relaxed flex-1">${r.description}</p><div class="rounded-lg bg-slate-50 border border-slate-200 p-4 text-sm text-slate-800 font-medium shadow-inner"><b class="text-slate-900 font-black block mb-1 uppercase text-[10px] tracking-wider">Engine Threshold/Configuration:</b> ${r.threshold}</div></div>`).join('')}
    </div></section>`);
}

function render(){
    let V={Dashboard:dashboard,'BOM Detail':detail,'Finding Review':()=>shell(`<section><h2 class="text-3xl font-black mb-1 text-slate-900">Finding Review Workflow</h2><p class="text-slate-600 font-medium mb-6 text-base">Human-in-the-loop status transition desk. Deterministic evidence is separated clearly from Advisory AI layers.</p>${findings(allF())}</section>`),'Run History':runHist,Logs:logs,Rules:rules}; 
    document.getElementById('app').innerHTML=V[S.view]()
} 
render();
</script></body></html>
